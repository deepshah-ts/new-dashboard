name: Continuous Integration and Deployment

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          cd backend
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        run: |
          gcloud config set project pelagic-campus-484800-b3 --quiet
          gcloud run deploy shopify-orders-backend \
            --image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend \
            --platform=managed \
            --region=us-east1 \
            --allow-unauthenticated \
            --port=3000 \
            --quiet


  frontend-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          cd frontend
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud config set project pelagic-campus-484800-b3 --quiet
          gcloud run deploy shopify-orders-frontend \
            --image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend \
            --platform=managed \
            --region=us-east1 \
            --allow-unauthenticated \
            --port=80 \
            --quiet