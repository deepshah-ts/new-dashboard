name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          cd backend
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy shopify-orders-backend \
            --project pelagic-campus-484800-b3 \
            --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:backend \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --port 8000 \
            --quiet
