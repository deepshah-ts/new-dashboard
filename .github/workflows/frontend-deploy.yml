name: Frontend CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          cd frontend
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend .
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy shopify-orders-frontend \
            --project pelagic-campus-484800-b3 \
            --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shopify-orders:frontend \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --port 3000 \
            --quiet
