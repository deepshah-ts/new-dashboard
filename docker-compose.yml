services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

      - JWT_SECRET=super-secret-key-tiffinstash
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:8080"

    depends_on:
      - backend
